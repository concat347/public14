# ---------------------------------------------------------------
# data-hpa.yaml
# Horizontal Pod Autoscaler for the data service.
# Scales data replicas based on CPU utilization.
#
# Thresholds:
#   - Scale up when average CPU across data pods exceeds 50% of request (100m)
#   - Min 1 replica, Max 5 replicas
#   - Scale up aggressively (15s window, 2 pods at a time)
#   - Scale down conservatively (120s window) to avoid thrashing
#   - Changed avrUtil to start scaling sooner
# ---------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50   # scale up when avg CPU > 50% of request (>50m)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15   # react quickly — don't wait long under load
      policies:
      - type: Pods
        value: 2                 # add up to 2 pods every 15 seconds
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 120  # wait 2 minutes before scaling down
