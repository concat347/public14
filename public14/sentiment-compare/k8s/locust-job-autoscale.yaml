# ---------------------------------------------------------------
# locust-job-autoscale.yaml
# Locust load test designed specifically to observe HPA and CA
# autoscaling behaviour under sustained load.
#
# Key differences from baseline jobs:
#   - run-time: 600s (10 min) — enough time for the full CA cycle:
#       HPA triggers (~15-30s) + CA provisions node (~2-4 min)
#       + pods schedule + load stabilises + scale-down observed
#   - spawn-rate: 5 users/s (slower ramp than baseline 10/s)
# ---------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: locust-autoscale
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: locust
          image: us-central1-docker.pkg.dev/sentiment-compare-gke/sentiment-repo/sentiment-compare-locust:latest
          args:
            - "--headless"
            - "--host=http://gateway:8000"
            - "--users=125"
            - "--spawn-rate=5"        # slow ramp — more visible scaling stages
            - "--run-time=600s"       # 10 minutes — full HPA + CA cycle
            - "--csv=/tmp/autoscale"
            - "--csv-full-history"
            - "--only-summary"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
 
