apiVersion: batch/v1
kind: Job
metadata:
  name: locust-baseline
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: locust
          image: us-central1-docker.pkg.dev/sentiment-compare-gke/sentiment-repo/sentiment-compare-locust:latest
          args:
            - "--headless"
            - "--host=http://gateway:8000"
            - "--users=75"
            - "--spawn-rate=10"
            - "--run-time=120s"
            - "--csv=/tmp/baseline"
            - "--csv-full-history"
            - "--only-summary"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
