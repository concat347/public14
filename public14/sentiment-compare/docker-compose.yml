services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
      POSTGRES_DB: stockdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockuser -d stockdb"]
      interval: 5s
      timeout: 5s
      retries: 5
  # -----------------------------
  # 🔥 Redpanda (Kafka replacement)
  # -----------------------------
  kafka:
    image: redpandadata/redpanda:v22.3.11
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --check=false
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=kafka:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=kafka:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=kafka:33145
      - --default-log-level=warn
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - microservices-network
  data:
    build: ./services/data
    ports:
      - "8003:8003"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: stockdb
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-network
  consumer:
    build: ./services/consumer
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_DB: stockdb
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices-network
  producer:
    build: ./services/producer
    ports:
      - "8001:8001"
    environment:
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY}
      POLYGON_API_KEY: ${POLYGON_API_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started
      consumer:
        condition: service_started
    networks:
      - microservices-network
  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      PRODUCER_URL: http://producer:8001
      DATA_URL: http://data:8003
      POSTGRES_HOST: postgres # The next 4 are for persistent metrics in postgres
      POSTGRES_DB: stockdb
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
    depends_on:
      - producer
      - data
    networks:
      - microservices-network
  dashboard:
    build: ./dashboard
    ports:
      - "8050:8050"
    depends_on:
      - data
    networks:
      - microservices-network
volumes:
  postgres-data:
  huggingface-cache:
networks:
  microservices-network:
    driver: bridge