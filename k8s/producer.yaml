# ---------------------------------------------------------------
# producer.yaml
# Stateless FastAPI service. Fetches news and price data and
# publishes messages to Kafka. No database connection needed.
# ---------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: us-central1-docker.pkg.dev/sentiment-compare-gke/sentiment-repo/sentiment-compare-producer:latest
          ports:
            - containerPort: 8001
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "redpanda:9092"
            - name: ALPHAVANTAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentiment-secrets
                  key: ALPHAVANTAGE_API_KEY
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentiment-secrets
                  key: POLYGON_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: producer
spec:
  selector:
    app: producer
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP